server:
  port: 9900
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

file:
  upload:
    path: ./papers
    allowed-extensions: pdf,txt,md

milvus:
  host: localhost
  port: 19530
  username: ""
  password: ""
  database: default
  timeout: 10000

spring:
  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:your-api-key-here}
      chat:
        options:
          timeout: 180000
      retry:
        max-attempts: 3
        backoff:
          initial-interval: 2000
          multiplier: 2
          max-interval: 10000

dashscope:
  api:
    key: ${DASHSCOPE_API_KEY:your-api-key-here}
  embedding:
    model: text-embedding-v4

document:
  chunk:
    max-size: 1200
    overlap: 200

rag:
  top-k: 5
  model: "qwen3-max"
  reranker-enabled: true

# ── LightRAG 集成配置 ─────────────────────────────────
# lightrag.enabled=true 时，上传也会同步建图，问答走 LightRAG 图搜索
lightrag:
  enabled: false                        # 默认关闭，开启需先启动 lightrag_service
  url: http://localhost:8021            # LightRAG HTTP 服务地址
  mode: mix                             # 检索模式: local / global / hybrid / naive / mix
